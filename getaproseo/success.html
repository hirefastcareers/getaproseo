<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — GetAProSEO</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'DM Sans', sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: white; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 480px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 10px; }
  p { color: #666; font-size: 15px; margin-bottom: 24px; line-height: 1.6; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 14px; color: #666; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Payment Confirmed!</h1>
  <p>Redirecting you back to your full SEO report now...</p>
  <div class="spinner"></div>
  <div class="status" id="status">Verifying payment...</div>
</div>
<script>
  // Redirect back to index with session params intact
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const url = params.get('url');
  const context = params.get('context');

  if (sessionId) {
    document.getElementById('status').textContent = 'Generating your report...';
    setTimeout(() => {
      const rawUrl = params.get('url') || '';
      const rawContext = params.get('context') || '';
      window.location.href = `/?session_id=${sessionId}&url=${rawUrl}&context=${rawContext}`;
    }, 1500);
  } else {
    window.location.href = '/';
  }
</script>
</body>
</html>
